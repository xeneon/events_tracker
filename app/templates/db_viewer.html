{% extends "base.html" %}
{% block title %} — Database{% endblock %}

{% block content %}
<h4 class="mb-4">Database Viewer</h4>
<div class="row g-3">

  <!-- Schema panel -->
  <div class="col-12 col-md-3">
    <div class="card h-100">
      <div class="card-header py-2 fw-semibold" style="font-size:0.85rem">Schema</div>
      <div class="card-body p-2" style="overflow-y:auto; max-height:75vh; font-size:0.8rem">
        {% for table, columns in schema.items() %}
        <details class="mb-1">
          <summary class="fw-semibold" style="cursor:pointer; padding:2px 4px">{{ table }}</summary>
          <ul class="list-unstyled ms-2 mt-1 mb-0">
            {% for col in columns %}
            <li class="d-flex justify-content-between gap-1 py-0" style="line-height:1.6">
              <span class="text-truncate" title="{{ col.column }}">{{ col.column }}</span>
              <span class="badge text-bg-secondary fw-normal" style="font-size:0.65rem; white-space:nowrap">{{ col.type }}</span>
            </li>
            {% endfor %}
          </ul>
        </details>
        {% endfor %}
      </div>
    </div>
  </div>

  <!-- Query panel -->
  <div class="col-12 col-md-9">
    <div class="card">
      <div class="card-header py-2 fw-semibold" style="font-size:0.85rem">SQL Query</div>
      <div class="card-body">
        <textarea id="sql-input" class="form-control font-monospace mb-2" rows="10"
          placeholder="SELECT * FROM events LIMIT 20"
          style="font-size:0.8rem; resize:vertical"></textarea>
        <div class="d-flex align-items-center gap-2">
          <button id="run-btn" class="btn btn-primary btn-sm" onclick="runQuery()">Run</button>
          <span id="spinner" class="spinner-border spinner-border-sm text-primary d-none" role="status"></span>
          <span id="row-count" class="text-muted" style="font-size:0.8rem"></span>
        </div>
      </div>
    </div>

    <div id="result-area" class="mt-3"></div>
  </div>

</div>

<script>
async function runQuery() {
  const sql = document.getElementById('sql-input').value.trim();
  if (!sql) return;

  const btn = document.getElementById('run-btn');
  const spinner = document.getElementById('spinner');
  const rowCount = document.getElementById('row-count');
  const resultArea = document.getElementById('result-area');

  btn.disabled = true;
  spinner.classList.remove('d-none');
  rowCount.textContent = '';
  resultArea.innerHTML = '';

  try {
    const resp = await fetch('/db/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sql}),
    });
    const data = await resp.json();

    if (data.error) {
      resultArea.innerHTML = `<div class="alert alert-danger py-2 font-monospace" style="font-size:0.8rem">${escHtml(data.error)}</div>`;
    } else if (data.message) {
      resultArea.innerHTML = `<div class="alert alert-success py-2" style="font-size:0.85rem">${escHtml(data.message)}</div>`;
    } else {
      rowCount.textContent = `${data.rows.length} row${data.rows.length !== 1 ? 's' : ''}`;
      resultArea.innerHTML = buildTable(data.columns, data.rows);
    }
  } catch (err) {
    resultArea.innerHTML = `<div class="alert alert-danger py-2">${escHtml(String(err))}</div>`;
  } finally {
    btn.disabled = false;
    spinner.classList.add('d-none');
  }
}

function buildTable(columns, rows) {
  const th = columns.map(c => `<th class="text-nowrap">${escHtml(c)}</th>`).join('');
  const tbody = rows.map(row =>
    `<tr>${row.map(v => `<td>${v === null ? '<span class="text-muted fst-italic">null</span>' : escHtml(String(v))}</td>`).join('')}</tr>`
  ).join('');
  return `
    <div class="card">
      <div class="card-body p-0" style="overflow:auto; max-height:55vh">
        <table class="table table-sm table-bordered table-hover mb-0" style="font-size:0.78rem">
          <thead class="table-dark sticky-top"><tr>${th}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Ctrl+Enter / Cmd+Enter to run
document.getElementById('sql-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runQuery();
});
</script>
{% endblock %}
