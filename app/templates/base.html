<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events Tracker{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      background: #212529;
      z-index: 100;
    }
    .sidebar .nav-link { color: #adb5bd; font-size: 0.875rem; padding: 0.35rem 1rem; border-radius: 5px; margin: 1px 6px; }
    .sidebar .nav-link:hover { background: #2c3034; color: #dee2e6; }
    .sidebar .nav-link.active { background: #0d6efd; color: #fff; font-weight: 500; }
    .sidebar .nav-section { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #6c757d; padding: 0.9rem 1rem 0.25rem; }
    .content { margin-left: 210px; flex: 1; min-width: 0; padding: 2.5rem 3rem; max-width: 1100px; }

    /* Hamburger toggle button (mobile only) */
    .sidebar-toggle {
      display: none;
      position: fixed; top: 0.75rem; left: 0.75rem;
      z-index: 200;
      background: #212529; border: none; color: #fff;
      border-radius: 6px; padding: 0.35rem 0.55rem; font-size: 1.2rem; line-height: 1;
      cursor: pointer;
    }

    /* Dark backdrop behind open sidebar */
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .sidebar-backdrop.show { display: block; }

    @media (max-width: 767px) {
      .sidebar-toggle { display: block; }
      .sidebar { transform: translateX(-210px); transition: transform 0.25s ease; }
      .sidebar.sidebar-open { transform: translateX(0); }
      .content { margin-left: 0; padding: 1rem; padding-top: 3.5rem; }
    }

    .log-pre {
      height: 360px; overflow-y: auto;
      background: #0d1117; color: #79c0ff;
      font-size: 0.75rem; padding: 1rem;
      white-space: pre-wrap; word-break: break-all;
      font-family: ui-monospace, monospace;
      margin: 0; border-radius: 0 0 6px 6px;
    }
  </style>
</head>
<body class="d-flex">
  <button class="sidebar-toggle" aria-label="Toggle navigation">&#9776;</button>
  <aside class="sidebar d-flex flex-column">
    <a href="/" class="d-block p-3 text-white text-decoration-none fw-bold border-bottom border-secondary" style="font-size:0.95rem">
      Events Tracker
    </a>
    <nav class="pt-1">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="/" class="nav-link {{ 'active' if active_page == 'home' else '' }}">Home</a>
        </li>
      </ul>
      <div class="nav-section">Scrapers</div>
      <ul class="nav flex-column">
        <li><a href="/scraper/calendarific" class="nav-link {{ 'active' if active_page == 'scraper_calendarific' else '' }}">Calendarific</a></li>
        <li><a href="/scraper/igdb" class="nav-link {{ 'active' if active_page == 'scraper_igdb' else '' }}">IGDB</a></li>
        <li><a href="/scraper/trakt" class="nav-link {{ 'active' if active_page == 'scraper_trakt' else '' }}">Trakt</a></li>
        <li><a href="/scraper/wikipedia-albums" class="nav-link {{ 'active' if active_page == 'scraper_wikipedia-albums' else '' }}">Wikipedia Albums</a></li>
      </ul>
      <div class="nav-section">Export</div>
      <ul class="nav flex-column">
        <li><a href="/export" class="nav-link {{ 'active' if active_page == 'export' else '' }}">Google Sheets</a></li>
      </ul>
      <div class="nav-section">Database</div>
      <ul class="nav flex-column">
        <li><a href="/db" class="nav-link {{ 'active' if active_page == 'db' else '' }}">Query</a></li>
      </ul>
    </nav>
  </aside>
  <div class="sidebar-backdrop"></div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <script>
    const btn = document.querySelector('.sidebar-toggle');
    const sidebar = document.querySelector('.sidebar');
    const backdrop = document.querySelector('.sidebar-backdrop');
    function openSidebar() { sidebar.classList.add('sidebar-open'); backdrop.classList.add('show'); }
    function closeSidebar() { sidebar.classList.remove('sidebar-open'); backdrop.classList.remove('show'); }
    btn.addEventListener('click', () => sidebar.classList.contains('sidebar-open') ? closeSidebar() : openSidebar());
    backdrop.addEventListener('click', closeSidebar);
    sidebar.querySelectorAll('.nav-link').forEach(a => a.addEventListener('click', closeSidebar));
  </script>
</body>
</html>
